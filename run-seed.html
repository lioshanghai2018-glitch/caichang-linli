<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Seed 触发器</title>
  <style>
    body { font-family: monospace; padding: 30px; background: #1e1e1e; color: #d4d4d4; }
    button { padding: 12px 24px; font-size: 16px; background: #4ec9b0; color: #000; border: none; cursor: pointer; border-radius: 4px; }
    pre { background: #252526; padding: 16px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; margin-top: 20px; }
  </style>
</head>
<body>
  <h2 style="color:#4ec9b0">买菜 4 端联调 — Seed 数据初始化</h2>
  <p>点击按钮调用云对象 seed 方法：</p>
  <button onclick="runSeed()">▶ 生成测试数据</button>
  <pre id="result">（等待点击）</pre>
  <script>
    async function runSeed() {
      const out = document.getElementById('result')
      out.textContent = '调用中...'
      try {
        const res = await fetch('https://fc-mp-ae9bd108-da40-4ae6-923b-c3007dedec12.next.bspapp.com/merchant-api/seed', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({})
        })
        const data = await res.json()
        out.textContent = JSON.stringify(data, null, 2)
      } catch (e) {
        out.textContent = '调用失败：' + e.message
      }
    }
  </script>
</body>
</html>
